---
# yamllint disable rule:line-length
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Git style
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: debug-statements

      # Common errors
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-executables-have-shebangs

      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--disable-plugin', 'KeywordDetector', '--disable-plugin', 'Base64HighEntropyString']

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.83.6
    hooks:
      - id: terraform_fmt
      - id: terraform_docs
        args:
          - --hook-config=--create-file-if-not-exist=true
          - --args=--sort-by=required
      - id: terraform_tflint
        args:
          - --args=--enable-rule=terraform_documented_variables
          - --args=--enable-rule=terraform_documented_outputs
          - --args=--enable-rule=terraform_comment_syntax
          - --args=--enable-rule=terraform_deprecated_interpolation
          - --args=--enable-rule=terraform_deprecated_index
          - --args=--enable-rule=terraform_naming_convention
          - --args=--enable-rule=terraform_unused_required_providers
      - id: terraform_checkov
        args:
          - --args=--quiet
          - --args=--skip-check CKV_TF_1

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.32.0  # or higher tag
    hooks:
      - id: yamllint

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.8.0-1
    hooks:
      - id: shfmt

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/pycqa/pylint
    rev: v3.1.0
    hooks:
      - id: pylint
